<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" width="720" height="540" role="img" aria-labelledby="title desc">
  <title id="title">kanban-task-engine architecture overview</title>
  <desc id="desc">Compact README diagram showing Vault Markdown as source of truth, Engine packages and policies, isolated agent execution through claude-code-executor or codex-runner, and external systems with Work mode limited to Jira export.</desc>
  <defs>
    <style>
      text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
      .title { font-size: 24px; font-weight: 700; fill: #172033; }
      .subtitle { font-size: 13px; fill: #475569; }
      .zone { font-size: 15px; font-weight: 700; }
      .head { font-size: 13px; font-weight: 700; fill: #172033; }
      .body { font-size: 12px; fill: #334155; }
      .small { font-size: 10px; fill: #64748b; }
      .note { font-size: 11px; fill: #7a3900; }
      .pill { font-size: 11px; font-weight: 700; }
      .arrow { font-size: 11px; fill: #475569; }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#1E88E5"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="720" height="540" fill="#f8fafc"/>
  <rect x="20" y="18" width="680" height="504" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4"/>

  <text x="40" y="54" class="title">kanban-task-engine</text>
  <text x="40" y="76" class="subtitle">Markdown-first task lifecycle engine with policy-gated execution</text>

  <rect x="40" y="108" width="180" height="190" rx="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" stroke-dasharray="7 4"/>
  <text x="58" y="136" class="zone" fill="#6a1b9a">Vault</text>
  <rect x="58" y="154" width="144" height="54" rx="5" fill="#ffffff" stroke="#AB47BC" stroke-width="1.4"/>
  <text x="130" y="176" text-anchor="middle" class="head">Markdown Issues</text>
  <text x="130" y="194" text-anchor="middle" class="body">.md + frontmatter</text>
  <rect x="58" y="222" width="144" height="54" rx="5" fill="#ffffff" stroke="#AB47BC" stroke-width="1.4"/>
  <text x="130" y="244" text-anchor="middle" class="head">Recipes + Registry</text>
  <text x="130" y="262" text-anchor="middle" class="body">mode modules policy</text>
  <text x="58" y="286" class="note">SoT lives in a vault repo</text>

  <rect x="270" y="96" width="240" height="216" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="290" y="124" class="zone" fill="#1b5e20">Engine</text>
  <rect x="290" y="144" width="92" height="66" rx="5" fill="#ffffff" stroke="#4CAF50" stroke-width="1.4"/>
  <text x="336" y="168" text-anchor="middle" class="head">packages/core</text>
  <text x="336" y="186" text-anchor="middle" class="body">runtime policy</text>
  <text x="336" y="202" text-anchor="middle" class="body">store executor</text>
  <rect x="398" y="144" width="92" height="66" rx="5" fill="#ffffff" stroke="#4CAF50" stroke-width="1.4"/>
  <text x="444" y="168" text-anchor="middle" class="head">schema</text>
  <text x="444" y="186" text-anchor="middle" class="body">IssueStatus (6)</text>
  <text x="444" y="202" text-anchor="middle" class="body">transitions (8)</text>
  <rect x="290" y="226" width="200" height="58" rx="5" fill="#ffffff" stroke="#4CAF50" stroke-width="1.4"/>
  <text x="390" y="248" text-anchor="middle" class="head">Adapters are fail-closed</text>
  <text x="390" y="266" text-anchor="middle" class="body">openclaw jira github firebase cli</text>
  <text x="390" y="296" text-anchor="middle" class="small">VALID_ISSUE_TRANSITIONS (8)</text>

  <rect x="552" y="108" width="128" height="190" rx="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" stroke-dasharray="7 4"/>
  <text x="570" y="136" class="zone" fill="#0d47a1">External</text>
  <rect x="570" y="154" width="92" height="40" rx="5" fill="#ffffff" stroke="#2196F3" stroke-width="1.4"/>
  <text x="616" y="178" text-anchor="middle" class="head">OpenClaw</text>
  <rect x="570" y="206" width="92" height="40" rx="5" fill="#ffffff" stroke="#2196F3" stroke-width="1.4"/>
  <text x="616" y="230" text-anchor="middle" class="head">Jira</text>
  <rect x="570" y="258" width="92" height="28" rx="5" fill="#ffffff" stroke="#2196F3" stroke-width="1.4"/>
  <text x="616" y="277" text-anchor="middle" class="body">GitHub Firebase</text>

  <line x1="220" y1="202" x2="268" y2="202" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="244" y="190" text-anchor="middle" class="arrow">parse</text>
  <line x1="510" y1="202" x2="550" y2="202" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="530" y="190" text-anchor="middle" class="arrow">adapter</text>

  <rect x="40" y="342" width="190" height="124" rx="6" fill="#fff7ed" stroke="#FF9800" stroke-width="1.6"/>
  <text x="58" y="370" class="head">Mode is emergent</text>
  <text x="58" y="394" class="body">recipe modules + policy</text>
  <text x="58" y="414" class="body">home-assisted</text>
  <text x="58" y="434" class="body">work-jira-export</text>
  <text x="58" y="454" class="body">validate-only no mutation</text>

  <rect x="270" y="342" width="200" height="124" rx="6" fill="#eef6ff" stroke="#1E88E5" stroke-width="1.6"/>
  <text x="290" y="370" class="head">Isolated execution</text>
  <text x="290" y="394" class="body">claude-code-executor</text>
  <text x="290" y="414" class="body">codex-runner</text>
  <text x="290" y="434" class="body">worktree per run</text>
  <text x="290" y="454" class="body">RUNNING to REVIEW or FAILED</text>

  <rect x="508" y="342" width="172" height="124" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.6"/>
  <text x="528" y="370" class="head">Work mode</text>
  <text x="528" y="394" class="body">Jira export only</text>
  <text x="528" y="414" class="body">sync.jira.* write-back</text>
  <text x="528" y="434" class="body">no body mutation</text>
  <text x="528" y="454" class="body">no Firebase/OpenClaw</text>

  <line x1="230" y1="404" x2="268" y2="404" stroke="#1E88E5" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="470" y1="404" x2="506" y2="404" stroke="#1E88E5" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="40" y="486" width="640" height="20" rx="10" fill="#e2e8f0"/>
  <text x="360" y="500" text-anchor="middle" class="pill" fill="#334155">Full one-page system map is linked from this README image</text>
</svg>
