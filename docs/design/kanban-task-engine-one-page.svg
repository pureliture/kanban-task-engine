<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="&#39;Segoe UI&#39;,&#39;Helvetica Neue&#39;,Arial,sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">kanban-task-engine system map</title>
  <desc id="desc">Full one-page architecture diagram showing the separate Vault source of truth, Engine roles, executor flow, issue lifecycle with IssueStatus and VALID_ISSUE_TRANSITIONS, and Work mode Jira export boundaries.</desc>
