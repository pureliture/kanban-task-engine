<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <style>
      .page-title { font-size: 18px; font-weight: bold; }
      .label { font-size: 13px; font-weight: bold; }
      .sublabel { font-size: 11px; }
      .annotation { font-size: 10px; }
      .panel-title { font-size: 12px; font-weight: bold; }
      .arrow-label { font-size: 10px; fill: #666; }
      .note { font-size: 9px; font-style: italic; fill: #666; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- ====== PAGE TITLE ====== -->
  <text x="40" y="28" class="page-title" fill="#333">kanban-task-engine — System Map</text>

  <!-- ====== VAULT ====== -->
  <rect x="40" y="50" width="500" height="150" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="60" y="72" class="label" fill="#7B1FA2">🗂 Vault (Live Issue State — separate Git repo)</text>

  <rect x="60" y="95" width="220" height="80" rx="4" fill="#ffffff" stroke="#AB47BC"/>
  <text x="170" y="125" text-anchor="middle" class="sublabel" fill="#333">Markdown Issues</text>
  <text x="170" y="145" text-anchor="middle" class="sublabel" fill="#666">(.md + YAML frontmatter)</text>

  <rect x="320" y="95" width="100" height="80" rx="4" fill="#ffffff" stroke="#AB47BC"/>
  <text x="370" y="125" text-anchor="middle" class="sublabel" fill="#333">Boards</text>
  <text x="370" y="145" text-anchor="middle" class="sublabel" fill="#666">kanban config</text>

  <rect x="440" y="95" width="100" height="80" rx="4" fill="#ffffff" stroke="#AB47BC"/>
  <text x="490" y="125" text-anchor="middle" class="sublabel" fill="#333">Templates</text>
  <text x="490" y="145" text-anchor="middle" class="sublabel" fill="#666">issue templates</text>

  <!-- ====== ENGINE ====== -->
  <rect x="580" y="50" width="980" height="200" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="600" y="72" class="label" fill="#000000">⚙️ Engine (Logic Only — no live state)</text>

  <rect x="600" y="95" width="180" height="110" rx="4" fill="#ffffff" stroke="#4CAF50"/>
  <text x="690" y="120" text-anchor="middle" class="sublabel" fill="#333">packages/core</text>
  <text x="690" y="145" text-anchor="middle" class="sublabel" fill="#666">Runtime, State Machine</text>
  <text x="690" y="165" text-anchor="middle" class="sublabel" fill="#666">Policy, Store, Executor</text>

  <rect x="800" y="95" width="160" height="110" rx="4" fill="#ffffff" stroke="#4CAF50"/>
  <text x="880" y="120" text-anchor="middle" class="sublabel" fill="#333">packages/schema</text>
  <text x="880" y="145" text-anchor="middle" class="sublabel" fill="#666">Frontmatter schema</text>
  <text x="880" y="165" text-anchor="middle" class="sublabel" fill="#666">Canonical JSON model</text>

  <rect x="980" y="95" width="140" height="110" rx="4" fill="#ffffff" stroke="#4CAF50"/>
  <text x="1050" y="120" text-anchor="middle" class="sublabel" fill="#333">recipes/</text>
  <text x="1050" y="145" text-anchor="middle" class="sublabel" fill="#666">.yaml</text>
  <text x="1050" y="165" text-anchor="middle" class="sublabel" fill="#666">mode + modules + policy</text>

  <rect x="1140" y="95" width="160" height="110" rx="4" fill="#ffffff" stroke="#4CAF50"/>
  <text x="1220" y="120" text-anchor="middle" class="sublabel" fill="#333">Adapters</text>
  <text x="1220" y="145" text-anchor="middle" class="sublabel" fill="#666">openclaw · claude-code</text>
  <text x="1220" y="165" text-anchor="middle" class="sublabel" fill="#666">jira · cli · github · firebase</text>

  <rect x="1320" y="95" width="140" height="110" rx="4" fill="#ffffff" stroke="#4CAF50"/>
  <text x="1390" y="120" text-anchor="middle" class="sublabel" fill="#333">packages/cli</text>
  <text x="1390" y="145" text-anchor="middle" class="sublabel" fill="#666">kanban run</text>
  <text x="1390" y="165" text-anchor="middle" class="sublabel" fill="#666">kanban sync · status</text>

  <!-- Engine annotations -->
  <rect x="1480" y="95" width="210" height="35" rx="4" fill="#FFF3E0" stroke="#FF9800"/>
  <text x="1490" y="118" class="annotation" fill="#BF360C">⚠️ No live state in engine repo</text>

  <rect x="1480" y="140" width="260" height="35" rx="4" fill="#FFF3E0" stroke="#FF9800"/>
  <text x="1490" y="163" class="annotation" fill="#BF360C">⚠️ Modes are emergent: recipe modules + policy</text>

  <rect x="1480" y="185" width="240" height="35" rx="4" fill="#FFF3E0" stroke="#FF9800"/>
  <text x="1490" y="208" class="annotation" fill="#BF360C">⚠️ Canonical JSON = internal contract</text>

  <!-- ====== EXTERNAL ====== -->
  <rect x="40" y="280" width="1520" height="80" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="60" y="302" class="label" fill="#000000">🌐 External Systems / Interfaces</text>

  <rect x="60" y="320" width="100" height="30" rx="4" fill="#ffffff" stroke="#2196F3"/>
  <text x="110" y="340" text-anchor="middle" class="sublabel" fill="#333">OpenClaw</text>

  <rect x="180" y="320" width="100" height="30" rx="4" fill="#ffffff" stroke="#2196F3"/>
  <text x="230" y="338" text-anchor="middle" class="sublabel" fill="#333">Jira</text>
  <text x="230" y="350" text-anchor="middle" class="sublabel" fill="#666">(Work only)</text>

  <rect x="300" y="320" width="80" height="30" rx="4" fill="#ffffff" stroke="#2196F3"/>
  <text x="340" y="340" text-anchor="middle" class="sublabel" fill="#333">GitHub</text>

  <rect x="400" y="320" width="80" height="30" rx="4" fill="#ffffff" stroke="#2196F3"/>
  <text x="440" y="340" text-anchor="middle" class="sublabel" fill="#333">Firebase</text>

  <rect x="1400" y="320" width="140" height="30" rx="4" fill="#ffffff" stroke="#2196F3"/>
  <text x="1470" y="338" text-anchor="middle" class="sublabel" fill="#333">CLI</text>
  <text x="1470" y="350" text-anchor="middle" class="sublabel" fill="#666">(User Interface)</text>

  <!-- ====== ARROWS (Top) ====== -->
  <line x1="540" y1="125" x2="580" y2="125" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="545" y="118" class="arrow-label">parse → canonical JSON</text>

  <line x1="1070" y1="250" x2="1070" y2="280" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="1080" y="268" class="arrow-label">adapter output</text>

  <!-- ====== PANEL 1: ISSUE LIFECYCLE ====== -->
  <rect x="40" y="400" width="480" height="220" rx="4" fill="#FAFAFA" stroke="#BDBDBD" stroke-dasharray="4,2"/>
  <text x="280" y="420" text-anchor="middle" class="panel-title" fill="#333">Panel 1: Issue Lifecycle (Status States)</text>

  <rect x="60" y="450" width="60" height="30" rx="4" fill="#FFF9C4" stroke="#FBC02D"/>
  <text x="90" y="470" text-anchor="middle" class="sublabel" fill="#333">TODO</text>

  <rect x="140" y="450" width="60" height="30" rx="4" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="170" y="470" text-anchor="middle" class="sublabel" fill="#333">READY</text>

  <rect x="220" y="450" width="70" height="30" rx="4" fill="#BBDEFB" stroke="#1976D2"/>
  <text x="255" y="470" text-anchor="middle" class="sublabel" fill="#333">RUNNING</text>

  <rect x="310" y="450" width="60" height="30" rx="4" fill="#FFF9C4" stroke="#FBC02D"/>
  <text x="340" y="470" text-anchor="middle" class="sublabel" fill="#333">REVIEW</text>

  <rect x="400" y="450" width="50" height="30" rx="4" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="425" y="470" text-anchor="middle" class="sublabel" fill="#333">DONE</text>

  <rect x="400" y="500" width="50" height="30" rx="4" fill="#FFEBEE" stroke="#F44336"/>
  <text x="425" y="520" text-anchor="middle" class="sublabel" fill="#333">FAILED</text>

  <text x="60" y="550" class="note" fill="#666">DONE / FAILED = terminal states</text>
  <text x="60" y="570" class="note" fill="#666">All transitions recorded in .md YAML frontmatter</text>

  <!-- Panel 1 arrows -->
  <polyline points="120,465 140,465" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <polyline points="200,465 220,465" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <polyline points="290,465 310,465" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <polyline points="370,465 400,465" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <polyline points="255,480 255,500 425,500" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- ====== PANEL 2: RECIPE → EXECUTION ====== -->
  <rect x="560" y="400" width="480" height="220" rx="4" fill="#FAFAFA" stroke="#BDBDBD" stroke-dasharray="4,2"/>
  <text x="800" y="420" text-anchor="middle" class="panel-title" fill="#333">Panel 2: Recipe → Execution Loop</text>

  <rect x="580" y="450" width="90" height="50" rx="4" fill="#E0E0E0" stroke="#666"/>
  <text x="625" y="470" text-anchor="middle" class="sublabel" fill="#333">Recipe YAML</text>
  <text x="625" y="485" text-anchor="middle" class="sublabel" fill="#666">mode + policy</text>

  <rect x="700" y="450" width="120" height="50" rx="4" fill="#D1C4E9" stroke="#7E57C2"/>
  <text x="760" y="470" text-anchor="middle" class="sublabel" fill="#333">modules: [parser,</text>
  <text x="760" y="485" text-anchor="middle" class="sublabel" fill="#333">validator, executor, ...]</text>

  <rect x="850" y="450" width="70" height="40" rx="4" fill="#C8E6C9" stroke="#388E3C"/>
  <text x="885" y="475" text-anchor="middle" class="sublabel" fill="#333">Policy Check</text>

  <rect x="580" y="520" width="90" height="45" rx="4" fill="#BBDEFB" stroke="#1976D2"/>
  <text x="625" y="545" text-anchor="middle" class="sublabel" fill="#333">claude-code-</text>
  <text x="625" y="555" text-anchor="middle" class="sublabel" fill="#333">executor</text>

  <rect x="700" y="525" width="70" height="30" rx="4" fill="#FFF9C4" stroke="#FBC02D"/>
  <text x="735" y="545" text-anchor="middle" class="sublabel" fill="#333">Worktree</text>

  <rect x="850" y="520" width="55" height="22" rx="4" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="877" y="535" text-anchor="middle" font-size="10" fill="#333">READY</text>

  <rect x="850" y="547" width="55" height="22" rx="4" fill="#BBDEFB" stroke="#1976D2"/>
  <text x="877" y="562" text-anchor="middle" font-size="10" fill="#333">RUNNING</text>

  <rect x="850" y="574" width="55" height="22" rx="4" fill="#FFF9C4" stroke="#FBC02D"/>
  <text x="877" y="589" text-anchor="middle" font-size="10" fill="#333">REVIEW</text>

  <rect x="850" y="601" width="55" height="22" rx="4" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="877" y="616" text-anchor="middle" font-size="10" fill="#333">DONE</text>

  <!-- Panel 2 arrows -->
  <polyline points="670,475 700,475" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <polyline points="820,475 850,475" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <polyline points="885,490 885,520 670,520" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <polyline points="625,565 625,525 700,525" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <polyline points="877,542 877,520" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <polyline points="877,569 877,547" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <polyline points="877,596 877,574" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- labels -->
  <text x="860" y="540" class="note" fill="#666">kanban run</text>
  <text x="860" y="567" class="note" fill="#666">exit 0</text>
  <text x="860" y="594" class="note" fill="#666">kanban approve</text>

  <!-- ====== PANEL 3: WORK SCENARIO ====== -->
  <rect x="1080" y="400" width="480" height="220" rx="4" fill="#FAFAFA" stroke="#BDBDBD" stroke-dasharray="4,2"/>
  <text x="1320" y="420" text-anchor="middle" class="panel-title" fill="#333">Panel 3: Work Scenario (Jira Export)</text>

  <rect x="1100" y="450" width="80" height="40" rx="4" fill="#F3E5F5" stroke="#9C27B0"/>
  <text x="1140" y="470" text-anchor="middle" class="sublabel" fill="#333">Vault</text>
  <text x="1140" y="485" text-anchor="middle" class="sublabel" fill="#666">Markdown</text>

  <rect x="1210" y="450" width="80" height="40" rx="4" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="1250" y="470" text-anchor="middle" class="sublabel" fill="#333">Engine</text>
  <text x="1250" y="485" text-anchor="middle" class="sublabel" fill="#666">Parser</text>

  <rect x="1160" y="520" width="90" height="35" rx="4" fill="#E3F2FD" stroke="#2196F3"/>
  <text x="1205" y="542" text-anchor="middle" class="sublabel" fill="#333">adapter-jira</text>

  <rect x="1160" y="580" width="90" height="35" rx="4" fill="#BBDEFB" stroke="#1976D2"/>
  <text x="1205" y="602" text-anchor="middle" class="sublabel" fill="#333">Jira API</text>

  <text x="1270" y="542" class="note" fill="#666">one-way export</text>

  <!-- Panel 3 arrows -->
  <polyline points="1180,470 1210,470" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <polyline points="1250,490 1205,520" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <polyline points="1205,555 1205,580" fill="none" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>

</svg>
