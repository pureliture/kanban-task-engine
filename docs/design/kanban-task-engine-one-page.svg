<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="opTitle opDesc">
  <title id="opTitle">kanban-task-engine system map</title>
  <desc id="opDesc">One-page architecture diagram. Vault as separate Git repo holding Markdown Issues (Source of Truth, SoT), Boards, and Recipes. Engine repo containing Core, Schema, Adapters (Jira GitHub Codex), and CLI logic only — no live state. External systems Codex (Home executor) and Jira and GitHub (Work integration). Issue lifecycle with IssueStatus (6) and VALID_ISSUE_TRANSITIONS (8) including TODO READY RUNNING REVIEW DONE FAILED. validate-only recipe mentioned. Adapters run in isolated worktree.</desc>
  <defs>
    <style>
      text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
      .ttl{font-size:22px;font-weight:700;}
      .sub{font-size:13px;}
      .zone{font-size:16px;font-weight:700;}
      .zsub{font-size:11px;font-style:italic;}
      .bh{font-size:13px;font-weight:700;}
      .bs{font-size:12px;}
      .bx{font-size:11px;font-style:italic;}
      .sot{font-size:12px;font-style:italic;}
      .ann{font-size:12px;}
      .ext{font-size:11px;}
      .arr{font-size:14px;}
      .arl{font-size:11px;}
      .lct{font-size:15px;font-weight:700;}
      .lcm{font-size:12px;}
      .stxt{font-size:13px;font-weight:700;}
      .lcl{font-size:11px;}
      .lcr{font-size:10px;font-style:italic;}
      .ftn{font-size:11px;font-style:italic;}
      .mono{font-family:Menlo,Consolas,monospace;font-size:12px;}
    </style>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>

  <!-- ═══ TITLE ═══ -->
  <text x="24" y="32" class="ttl" fill="#1a1a1a">kanban-task-engine — System Map</text>
  <text x="24" y="54" class="sub" fill="#888">packages/schema/src/status.ts 기준 IssueStatus (6) · VALID_ISSUE_TRANSITIONS (8)</text>

  <!-- ═══ ARCHITECTURE ROW ═══ -->

  <!-- VAULT zone -->
  <rect x="24" y="76" width="240" height="232" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="36" y="100" class="zone" fill="#6a1b9a">🗂 Vault</text>
  <text x="36" y="118" class="zsub" fill="#9C27B0">별도 Git 저장소</text>

  <!-- Vault > Markdown Issues card -->
  <rect x="36" y="128" width="216" height="60" fill="#ffffff" stroke="#AB47BC"/>
  <text x="46" y="146" class="bh" fill="#1a1a1a">Markdown Issues<tspan fill="#AB47BC" font-weight="400">  .md</tspan></text>
  <text x="46" y="164" class="sot" fill="#7a3900">← Source of Truth (SoT)</text>
  <text x="46" y="180" class="bs" fill="#555">사람이 직접 읽고 쓰는 파일</text>

  <!-- Vault > Boards card -->
  <rect x="36" y="194" width="216" height="44" fill="#ffffff" stroke="#AB47BC"/>
  <text x="46" y="212" class="bh" fill="#1a1a1a">Boards<tspan fill="#AB47BC" font-weight="400">  .md</tspan></text>
  <text x="46" y="230" class="bs" fill="#555">어떤 이슈가 어느 컬럼에 있는지</text>

  <!-- Vault > Recipes card -->
  <rect x="36" y="244" width="216" height="58" fill="#ffffff" stroke="#AB47BC"/>
  <text x="46" y="262" class="bh" fill="#1a1a1a">Recipes<tspan fill="#AB47BC" font-weight="400">  .yaml</tspan></text>
  <text x="46" y="278" class="bs" fill="#555">누가 어떤 도구로 실행할지</text>
  <text x="46" y="294" class="bx" fill="#888">예: codex 실행 / validate-only / Jira export</text>

  <!-- Arrow Vault -> Engine -->
  <text x="280" y="190" class="arr" fill="#555" text-anchor="middle">→</text>
  <text x="280" y="206" class="arl" fill="#555" text-anchor="middle">읽어서</text>
  <text x="280" y="220" class="arl" fill="#555" text-anchor="middle">JSON화</text>

  <!-- ENGINE zone -->
  <rect x="296" y="76" width="722" height="232" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="308" y="100" class="zone" fill="#1b5e20">⚙️ Engine</text>
  <text x="308" y="118" class="zsub" fill="#4CAF50">로직만 · 데이터(live state) 없음</text>

  <!-- Engine > 4 boxes -->
  <rect x="308" y="130" width="170" height="170" fill="#ffffff" stroke="#4CAF50"/>
  <text x="318" y="152" class="bh" fill="#1a1a1a">Core</text>
  <text x="318" y="174" class="bs" fill="#555">상태 전이 · 실행 루프</text>
  <text x="318" y="194" class="bs" fill="#555">PolicyEngine</text>
  <text x="318" y="214" class="bs" fill="#555">DeadLetterQ · EventBus</text>
  <text x="318" y="244" class="bx" fill="#888">Canonical JSON 생성</text>

  <rect x="486" y="130" width="170" height="170" fill="#ffffff" stroke="#4CAF50"/>
  <text x="496" y="152" class="bh" fill="#1a1a1a">Schema</text>
  <text x="496" y="174" class="bs" fill="#555">.md ↔ Canonical JSON 계약</text>
  <text x="496" y="194" class="bs" fill="#555">IssueFrontmatter</text>
  <text x="496" y="244" class="bx" fill="#888">internal contract</text>

  <rect x="664" y="130" width="170" height="170" fill="#ffffff" stroke="#4CAF50"/>
  <text x="674" y="152" class="bh" fill="#1a1a1a">Adapters</text>
  <text x="674" y="174" class="bs" fill="#555">Jira · GitHub · Codex</text>
  <text x="674" y="194" class="bs" fill="#555">codex-runner</text>
  <text x="674" y="214" class="bs" fill="#555">isolated Worktree</text>
  <text x="674" y="244" class="bx" fill="#888">RuntimePolicy 검사</text>

  <rect x="842" y="130" width="170" height="170" fill="#ffffff" stroke="#4CAF50"/>
  <text x="852" y="152" class="bh" fill="#1a1a1a">CLI</text>
  <text x="852" y="174" class="mono" fill="#1a1a1a">kanban run</text>
  <text x="852" y="194" class="mono" fill="#1a1a1a">  --execute --agent codex</text>
  <text x="852" y="218" class="mono" fill="#1a1a1a">kanban approve / retry</text>
  <text x="852" y="244" class="bx" fill="#888">사용자 진입점</text>

  <!-- Arrow Engine -> External -->
  <text x="1034" y="190" class="arr" fill="#555" text-anchor="middle">→</text>
  <text x="1034" y="206" class="arl" fill="#555" text-anchor="middle">adapter</text>
  <text x="1034" y="220" class="arl" fill="#555" text-anchor="middle">경유</text>

  <!-- EXTERNAL zone -->
  <rect x="1050" y="76" width="206" height="232" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="1062" y="100" class="zone" fill="#0d47a1">🌐 External</text>
  <text x="1062" y="118" class="zsub" fill="#1565C0">외부 시스템</text>

  <rect x="1062" y="128" width="182" height="78" fill="#ffffff" stroke="#2196F3"/>
  <text x="1153" y="152" class="bh" fill="#1a1a1a" text-anchor="middle">Codex</text>
  <text x="1153" y="172" class="bs" fill="#555" text-anchor="middle">Home 실행기</text>
  <text x="1153" y="192" class="bx" fill="#888" text-anchor="middle">codex-runner</text>

  <rect x="1062" y="216" width="182" height="80" fill="#ffffff" stroke="#2196F3"/>
  <text x="1153" y="240" class="bh" fill="#1a1a1a" text-anchor="middle">Jira · GitHub</text>
  <text x="1153" y="260" class="bs" fill="#555" text-anchor="middle">Work 연동 (export)</text>
  <text x="1153" y="280" class="bx" fill="#888" text-anchor="middle">단방향</text>

  <!-- ═══ ANNOTATIONS ═══ -->
  <rect x="24" y="324" width="404" height="48" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="36" y="346" class="ann" fill="#7a3900"><tspan font-weight="700">💡 Engine repo에 live state 없음</tspan></text>
  <text x="36" y="362" class="ann" fill="#7a3900">Vault는 별도 Git 저장소 (Markdown SoT)</text>

  <rect x="438" y="324" width="404" height="48" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="450" y="346" class="ann" fill="#7a3900"><tspan font-weight="700">💡 Mode is emergent</tspan></text>
  <text x="450" y="362" class="ann" fill="#7a3900">recipe modules + policy 조합으로 결정 (코드에 switch 없음)</text>

  <rect x="852" y="324" width="404" height="48" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="864" y="346" class="ann" fill="#7a3900"><tspan font-weight="700">💡 Canonical JSON = internal contract</tspan></text>
  <text x="864" y="362" class="ann" fill="#7a3900">human editing surface 아님 (.md가 SoT)</text>

  <!-- ═══ LIFECYCLE PANEL ═══ -->
  <rect x="24" y="396" width="1232" height="270" rx="8" fill="#fafafa" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="640" y="424" class="lct" fill="#222" text-anchor="middle">Issue Lifecycle</text>
  <text x="640" y="442" class="lcm" fill="#888" text-anchor="middle">— IssueStatus (6) · VALID_ISSUE_TRANSITIONS (8) —</text>

  <!-- Forward badges -->
  <rect x="84"   y="468" width="100" height="36" rx="4" fill="#FFF3CD" stroke="#E6A817" stroke-width="2"/>
  <text x="134" y="492" class="stxt" fill="#5c3d00" text-anchor="middle">TODO</text>

  <rect x="284"  y="468" width="100" height="36" rx="4" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
  <text x="334" y="492" class="stxt" fill="#2e7d32" text-anchor="middle">READY</text>

  <rect x="484"  y="468" width="120" height="36" rx="4" fill="#BBDEFB" stroke="#1E88E5" stroke-width="2"/>
  <text x="544" y="492" class="stxt" fill="#1565C0" text-anchor="middle">RUNNING</text>

  <rect x="704"  y="468" width="120" height="36" rx="4" fill="#FFF3CD" stroke="#E6A817" stroke-width="2"/>
  <text x="764" y="492" class="stxt" fill="#5c3d00" text-anchor="middle">REVIEW</text>

  <rect x="924"  y="468" width="100" height="36" rx="4" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
  <text x="974" y="492" class="stxt" fill="#2e7d32" text-anchor="middle">DONE</text>

  <!-- Forward arrows + labels (between badges) -->
  <text x="234" y="486" class="arr" fill="#555" text-anchor="middle">→</text>
  <text x="234" y="502" class="lcl" fill="#555" text-anchor="middle">prep</text>

  <text x="434" y="486" class="arr" fill="#555" text-anchor="middle">→</text>
  <text x="434" y="502" class="lcl" fill="#555" text-anchor="middle">--execute</text>

  <text x="654" y="486" class="arr" fill="#555" text-anchor="middle">→</text>
  <text x="654" y="502" class="lcl" fill="#555" text-anchor="middle">exit 0 + 변경</text>

  <text x="874" y="486" class="arr" fill="#555" text-anchor="middle">→</text>
  <text x="874" y="502" class="lcl" fill="#555" text-anchor="middle">approve</text>

  <!-- Reverse labels under badges -->
  <text x="234" y="525" class="lcr" fill="#888" text-anchor="middle">↺ READY → TODO (되돌리기)</text>
  <text x="764" y="525" class="lcr" fill="#888" text-anchor="middle">↺ REVIEW → RUNNING (retry)</text>

  <!-- FAILED branch row -->
  <text x="544" y="566" class="lcr" fill="#c62828" text-anchor="middle">↓ exit non-0 / no-change</text>
  <rect x="484" y="578" width="120" height="36" rx="4" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="544" y="602" class="stxt" fill="#b71c1c" text-anchor="middle">FAILED</text>
  <text x="704" y="602" class="lcr" fill="#888" text-anchor="middle">↺ retry → READY</text>

  <!-- Lifecycle footnote -->
  <text x="640" y="640" class="ftn" fill="#666" text-anchor="middle">8개 전이 상세: <tspan font-family="Menlo,Consolas,monospace">packages/schema/src/status.ts</tspan> · validate-only 모드는 mutation 없이 검증만</text>

  <!-- Footer -->
  <text x="24" y="700" class="ftn" fill="#888">자산: drawio · svg · kanban-use-case.svg / 색상 규칙은 docs/design/README.md 참조</text>
</svg>
