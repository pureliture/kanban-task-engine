<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="opTitle opDesc"
     font-family="'Segoe UI',system-ui,-apple-system,BlinkMacSystemFont,sans-serif">
  <title id="opTitle">kanban-task-engine system map</title>
  <desc id="opDesc">One-page architecture diagram. Vault as separate Git repo holding Markdown Issues (Source of Truth, SoT), Boards, and Recipes. Engine repo with Core, Schema, Adapters (Jira GitHub Codex), and CLI logic only — no live state. External systems Codex (Home executor) and Jira and GitHub (Work integration). Issue lifecycle with IssueStatus (6) and VALID_ISSUE_TRANSITIONS (8) including TODO READY RUNNING REVIEW DONE FAILED. validate-only recipe mentioned. Adapters run in isolated Worktree. Canonical JSON internal contract.</desc>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="35%" stop-color="#eef2ff"/>
      <stop offset="70%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#f0fdfa"/>
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offset-blur"/>
      <feFlood flood-color="#1e1b4b" flood-opacity="0.18"/>
      <feComposite in2="offset-blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <style>
      .h-title { font-size: 22px; font-weight: 700; fill: #1e293b; letter-spacing: 0.5; }
      .h-sub   { font-size: 12px; fill: #64748b; }
      .zh      { font-size: 16px; font-weight: 700; fill: #ffffff; letter-spacing: 0.3; }
      .zsub    { font-size: 11px; fill: #ffffff; opacity: 0.85; font-style: italic; }
      .bh      { font-size: 13px; font-weight: 700; fill: #1e293b; }
      .bs      { font-size: 12px; fill: #475569; }
      .bx      { font-size: 11px; fill: #94a3b8; font-style: italic; }
      .sot     { font-size: 11px; fill: #b45309; font-style: italic; font-weight: 600; }
      .ann     { font-size: 12px; fill: #475569; }
      .ann-h   { font-size: 12px; fill: #1e293b; font-weight: 700; }
      .lab-box { font-size: 11px; font-weight: 500; fill: #475569; }
      .lct     { font-size: 16px; font-weight: 700; fill: #1e293b; letter-spacing: 0.3; }
      .lcm     { font-size: 11px; fill: #64748b; }
      .stxt    { font-size: 13px; font-weight: 700; }
      .lcl     { font-size: 11px; fill: #475569; }
      .lcr     { font-size: 10px; fill: #94a3b8; font-style: italic; }
      .ftn     { font-size: 11px; fill: #64748b; font-style: italic; }
      .mono    { font-family: Menlo, Consolas, 'Courier New', monospace; font-size: 11px; fill: #1e293b; }
    </style>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="1120" height="760" rx="18" fill="url(#bg-grad)"/>

  <!-- Decorative dots -->
  <circle cx="30"   cy="30"  r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="1090" cy="30"  r="3" fill="#3b82f6" opacity="0.4"/>
  <circle cx="30"   cy="730" r="3" fill="#10b981" opacity="0.4"/>
  <circle cx="1090" cy="730" r="3" fill="#f59e0b" opacity="0.4"/>

  <!-- Title -->
  <text x="560" y="42" text-anchor="middle" dominant-baseline="middle" class="h-title">kanban-task-engine — System Map</text>
  <line x1="430" y1="62" x2="510" y2="62" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  <line x1="610" y1="62" x2="690" y2="62" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <circle cx="560" cy="62" r="4" fill="#8b5cf6"/>
  <text x="560" y="82" text-anchor="middle" class="h-sub">IssueStatus (6) · VALID_ISSUE_TRANSITIONS (8) · packages/schema/src/status.ts</text>

  <!-- ═══ ARCHITECTURE ROW ═══ -->

  <!-- VAULT zone -->
  <g filter="url(#shadow)">
    <rect x="40" y="110" width="260" height="280" rx="12" fill="#ffffff" stroke="#a78bfa" stroke-width="1.5"/>
    <rect x="40" y="110" width="260" height="44" rx="12" fill="url(#purple-grad)"/>
    <rect x="40" y="132" width="260" height="22" fill="url(#purple-grad)"/>
  </g>
  <text x="170" y="132" text-anchor="middle" dominant-baseline="middle" class="zh">🗂  Vault</text>
  <text x="170" y="148" text-anchor="middle" dominant-baseline="middle" class="zsub">별도 Git 저장소 — Live Issue State</text>

  <!-- Vault > Markdown Issues -->
  <rect x="56" y="170" width="228" height="78" rx="6" fill="#fdf4ff" stroke="#c4b5fd"/>
  <text x="68" y="190" class="bh">Markdown Issues  <tspan fill="#7c3aed" font-weight="500">.md</tspan></text>
  <text x="68" y="208" class="sot">← Source of Truth (SoT)</text>
  <text x="68" y="226" class="bs">사람이 직접 읽고 쓰는 파일</text>
  <text x="68" y="242" class="bx">issues/ · epics/ · runs/ · events/</text>

  <!-- Vault > Boards -->
  <rect x="56" y="258" width="228" height="56" rx="6" fill="#fdf4ff" stroke="#c4b5fd"/>
  <text x="68" y="278" class="bh">Boards  <tspan fill="#7c3aed" font-weight="500">.md</tspan></text>
  <text x="68" y="296" class="bs">어떤 이슈가 어느 컬럼에 있는지</text>
  <text x="68" y="310" class="bx">boards/ · templates/</text>

  <!-- Vault > Recipes -->
  <rect x="56" y="318" width="228" height="62" rx="6" fill="#fdf4ff" stroke="#c4b5fd"/>
  <text x="68" y="338" class="bh">Recipes  <tspan fill="#7c3aed" font-weight="500">.yaml</tspan></text>
  <text x="68" y="356" class="bs">누가 어떤 도구로 실행할지</text>
  <text x="68" y="372" class="bx">예: codex 실행 / validate-only / Jira export</text>

  <!-- Arrow Vault → Engine (line split around label) -->
  <line x1="300" y1="250" x2="305" y2="250" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="305" y="238" width="70" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="340" y="253" text-anchor="middle" dominant-baseline="middle" class="lab-box">parse → JSON</text>
  <line x1="375" y1="250" x2="380" y2="250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ENGINE zone -->
  <g filter="url(#shadow)">
    <rect x="380" y="110" width="500" height="280" rx="12" fill="#ffffff" stroke="#34d399" stroke-width="1.5"/>
    <rect x="380" y="110" width="500" height="44" rx="12" fill="url(#green-grad)"/>
    <rect x="380" y="132" width="500" height="22" fill="url(#green-grad)"/>
  </g>
  <text x="630" y="132" text-anchor="middle" dominant-baseline="middle" class="zh">⚙️  Engine — Logic Only</text>
  <text x="630" y="148" text-anchor="middle" dominant-baseline="middle" class="zsub">로직 · 스키마 · 정책만 (live state 없음)</text>

  <!-- Engine sub-boxes (4 columns) -->
  <rect x="396" y="170" width="114" height="206" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="453" y="194" text-anchor="middle" class="bh">Core</text>
  <text x="453" y="216" text-anchor="middle" class="bs">상태 전이</text>
  <text x="453" y="232" text-anchor="middle" class="bs">실행 루프</text>
  <text x="453" y="248" text-anchor="middle" class="bs">PolicyEngine</text>
  <text x="453" y="264" text-anchor="middle" class="bs">EventBus</text>
  <text x="453" y="280" text-anchor="middle" class="bs">DeadLetterQ</text>
  <text x="453" y="320" text-anchor="middle" class="bx">Canonical JSON</text>
  <text x="453" y="336" text-anchor="middle" class="bx">생성 · 정책 검사</text>

  <rect x="518" y="170" width="114" height="206" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="575" y="194" text-anchor="middle" class="bh">Schema</text>
  <text x="575" y="216" text-anchor="middle" class="bs">.md ↔ JSON</text>
  <text x="575" y="232" text-anchor="middle" class="bs">변환 계약</text>
  <text x="575" y="252" text-anchor="middle" class="bs">IssueFrontmatter</text>
  <text x="575" y="320" text-anchor="middle" class="bx">internal contract</text>
  <text x="575" y="336" text-anchor="middle" class="bx">(human edit 아님)</text>

  <rect x="640" y="170" width="114" height="206" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="697" y="194" text-anchor="middle" class="bh">Adapters</text>
  <text x="697" y="216" text-anchor="middle" class="bs">Jira</text>
  <text x="697" y="232" text-anchor="middle" class="bs">GitHub</text>
  <text x="697" y="248" text-anchor="middle" class="bs">Codex</text>
  <text x="697" y="268" text-anchor="middle" class="bs">codex-runner</text>
  <text x="697" y="320" text-anchor="middle" class="bx">isolated Worktree</text>
  <text x="697" y="336" text-anchor="middle" class="bx">RuntimePolicy</text>

  <rect x="762" y="170" width="102" height="206" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="813" y="194" text-anchor="middle" class="bh">CLI</text>
  <text x="813" y="218" text-anchor="middle" class="mono">kanban run</text>
  <text x="813" y="234" text-anchor="middle" class="mono">kanban next</text>
  <text x="813" y="250" text-anchor="middle" class="mono">kanban approve</text>
  <text x="813" y="266" text-anchor="middle" class="mono">kanban retry</text>
  <text x="813" y="320" text-anchor="middle" class="bx">사용자 진입점</text>
  <text x="813" y="336" text-anchor="middle" class="bx">--execute --agent</text>

  <!-- Arrow Engine → External (line split around label) -->
  <line x1="880" y1="250" x2="885" y2="250" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="885" y="238" width="60" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="915" y="253" text-anchor="middle" dominant-baseline="middle" class="lab-box">adapter</text>
  <line x1="945" y1="250" x2="950" y2="250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- EXTERNAL zone -->
  <g filter="url(#shadow)">
    <rect x="945" y="110" width="135" height="280" rx="12" fill="#ffffff" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="945" y="110" width="135" height="44" rx="12" fill="url(#blue-grad)"/>
    <rect x="945" y="132" width="135" height="22" fill="url(#blue-grad)"/>
  </g>
  <text x="1012" y="132" text-anchor="middle" dominant-baseline="middle" class="zh">🌐 External</text>
  <text x="1012" y="148" text-anchor="middle" dominant-baseline="middle" class="zsub">외부 시스템</text>

  <rect x="961" y="172" width="103" height="92" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="1012" y="198" text-anchor="middle" class="bh">Codex</text>
  <text x="1012" y="220" text-anchor="middle" class="bs">Home 실행기</text>
  <text x="1012" y="240" text-anchor="middle" class="bx">codex-runner</text>
  <text x="1012" y="256" text-anchor="middle" class="bx">isolated Worktree</text>

  <rect x="961" y="274" width="103" height="100" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="1012" y="298" text-anchor="middle" class="bh">Jira · GitHub</text>
  <text x="1012" y="318" text-anchor="middle" class="bs">Work 연동</text>
  <text x="1012" y="338" text-anchor="middle" class="bx">단방향 export</text>
  <text x="1012" y="356" text-anchor="middle" class="bx">read-only attach</text>

  <!-- ═══ ANNOTATION ROW ═══ -->
  <g filter="url(#shadow)">
    <rect x="40"  y="416" width="338" height="60" rx="8" fill="#ffffff" stroke="#fbbf24" stroke-width="1.2"/>
  </g>
  <text x="56" y="438" class="ann-h">💡 Engine repo에 live state 없음</text>
  <text x="56" y="458" class="ann">Vault는 별도 Git 저장소 (Markdown SoT)</text>

  <g filter="url(#shadow)">
    <rect x="391" y="416" width="338" height="60" rx="8" fill="#ffffff" stroke="#fbbf24" stroke-width="1.2"/>
  </g>
  <text x="407" y="438" class="ann-h">💡 Mode is emergent</text>
  <text x="407" y="458" class="ann">recipe modules + policy 조합으로 결정 (코드 switch 없음)</text>

  <g filter="url(#shadow)">
    <rect x="742" y="416" width="338" height="60" rx="8" fill="#ffffff" stroke="#fbbf24" stroke-width="1.2"/>
  </g>
  <text x="758" y="438" class="ann-h">💡 Canonical JSON = internal contract</text>
  <text x="758" y="458" class="ann">human editing surface 아님 (.md만 SoT)</text>

  <!-- ═══ LIFECYCLE PANEL ═══ -->
  <g filter="url(#shadow)">
    <rect x="40" y="500" width="1040" height="220" rx="12" fill="#ffffff" stroke="#2dd4bf" stroke-width="1.5"/>
    <rect x="40" y="500" width="1040" height="44" rx="12" fill="url(#teal-grad)"/>
    <rect x="40" y="522" width="1040" height="22" fill="url(#teal-grad)"/>
  </g>
  <text x="560" y="522" text-anchor="middle" dominant-baseline="middle" class="zh">🔁  Issue Lifecycle</text>
  <text x="560" y="538" text-anchor="middle" dominant-baseline="middle" class="zsub">IssueStatus (6) · VALID_ISSUE_TRANSITIONS (8) — happy path 5단계 + reverse 2 + FAILED 분기</text>

  <!-- Forward badges row -->
  <g filter="url(#shadow)">
    <rect x="80"   y="582" width="118" height="40" rx="20" fill="#FFF3CD" stroke="#E6A817" stroke-width="2"/>
  </g>
  <text x="139" y="606" text-anchor="middle" class="stxt" fill="#5c3d00">TODO</text>

  <g filter="url(#shadow)">
    <rect x="280"  y="582" width="118" height="40" rx="20" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
  </g>
  <text x="339" y="606" text-anchor="middle" class="stxt" fill="#2e7d32">READY</text>

  <g filter="url(#shadow)">
    <rect x="480"  y="582" width="138" height="40" rx="20" fill="#BBDEFB" stroke="#1E88E5" stroke-width="2"/>
  </g>
  <text x="549" y="606" text-anchor="middle" class="stxt" fill="#1565C0">RUNNING</text>

  <g filter="url(#shadow)">
    <rect x="700"  y="582" width="128" height="40" rx="20" fill="#FFF3CD" stroke="#E6A817" stroke-width="2"/>
  </g>
  <text x="764" y="606" text-anchor="middle" class="stxt" fill="#5c3d00">REVIEW</text>

  <g filter="url(#shadow)">
    <rect x="910"  y="582" width="118" height="40" rx="20" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
  </g>
  <text x="969" y="606" text-anchor="middle" class="stxt" fill="#2e7d32">DONE</text>

  <!-- Forward arrows + labels (line split around label box) -->
  <line x1="200" y1="602" x2="216" y2="602" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="216" y="590" width="46" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="239" y="605" text-anchor="middle" dominant-baseline="middle" class="lab-box">prep</text>
  <line x1="262" y1="602" x2="278" y2="602" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="400" y1="602" x2="408" y2="602" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="408" y="590" width="68" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="442" y="605" text-anchor="middle" dominant-baseline="middle" class="lab-box mono">--execute</text>
  <line x1="476" y1="602" x2="478" y2="602" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="620" y1="602" x2="624" y2="602" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="624" y="590" width="74" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="661" y="605" text-anchor="middle" dominant-baseline="middle" class="lab-box">exit 0 + 변경</text>
  <line x1="698" y1="602" x2="700" y2="602" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="830" y1="602" x2="838" y2="602" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="838" y="590" width="62" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="869" y="605" text-anchor="middle" dominant-baseline="middle" class="lab-box">approve</text>
  <line x1="900" y1="602" x2="908" y2="602" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Reverse labels (boxed for visual consistency) -->
  <rect x="160" y="630" width="158" height="22" rx="11" fill="#fefce8" stroke="#fde68a"/>
  <text x="239" y="645" text-anchor="middle" dominant-baseline="middle" class="lcr" fill="#854d0e">↺ READY → TODO (되돌리기)</text>

  <rect x="780" y="630" width="178" height="22" rx="11" fill="#fefce8" stroke="#fde68a"/>
  <text x="869" y="645" text-anchor="middle" dominant-baseline="middle" class="lcr" fill="#854d0e">↺ REVIEW → RUNNING (retry)</text>

  <!-- FAILED branch: RUNNING ↓ FAILED -->
  <line x1="549" y1="622" x2="549" y2="664" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-red)"/>
  <text x="556" y="648" text-anchor="start" class="lcr" fill="#dc2626">exit non-0 / 변경 없음</text>

  <!-- FAILED badge -->
  <g filter="url(#shadow)">
    <rect x="490" y="670" width="118" height="40" rx="20" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  </g>
  <text x="549" y="694" text-anchor="middle" class="stxt" fill="#b71c1c">FAILED</text>

  <!-- retry: FAILED → READY (elbow path) -->
  <path d="M 490 690 L 339 690 L 339 624" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <rect x="364" y="678" width="116" height="22" rx="11" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="422" y="693" text-anchor="middle" dominant-baseline="middle" class="lcr">↺ retry → READY</text>

  <!-- ═══ FOOTER ═══ -->
  <text x="560" y="744" text-anchor="middle" class="ftn">자산: kanban-task-engine-one-page.{drawio,svg,html} · kanban-use-case.{drawio,svg,html} — 색상 규칙 docs/design/README.md</text>
</svg>
