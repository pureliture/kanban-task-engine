<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 200" width="1400" height="200">
  <defs>
    <linearGradient id="h-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d20"/>
      <stop offset="50%" stop-color="#100f38"/>
      <stop offset="100%" stop-color="#091525"/>
    </linearGradient>
    <linearGradient id="h-stripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="35%" stop-color="#8b5cf6"/>
      <stop offset="65%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="h-underline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="18%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="82%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="h-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="200" fill="url(#h-bg)"/>

  <!-- Center glow blob -->
  <ellipse cx="700" cy="100" rx="500" ry="80" fill="url(#h-glow)"/>

  <!-- Top accent stripe -->
  <rect width="1400" height="3" fill="url(#h-stripe)"/>

  <!-- Kanban lane separators -->
  <line x1="280"  y1="18" x2="280"  y2="160" stroke="#6366f1" stroke-width="1" opacity="0.10"/>
  <line x1="560"  y1="18" x2="560"  y2="160" stroke="#6366f1" stroke-width="1" opacity="0.10"/>
  <line x1="840"  y1="18" x2="840"  y2="160" stroke="#6366f1" stroke-width="1" opacity="0.10"/>
  <line x1="1120" y1="18" x2="1120" y2="160" stroke="#6366f1" stroke-width="1" opacity="0.10"/>

  <!-- Status pill: TODO (lane center 140) -->
  <rect x="95"   y="28" width="90"  height="22" rx="11" fill="#6366f1" opacity="0.18"/>
  <text x="140"  y="44" text-anchor="middle" font-family="'Courier New',Consolas,monospace" font-size="10" font-weight="700" fill="#a5b4fc" opacity="0.80">TODO</text>

  <!-- Status pill: READY (lane center 420) -->
  <rect x="373"  y="38" width="94"  height="22" rx="11" fill="#10b981" opacity="0.18"/>
  <text x="420"  y="54" text-anchor="middle" font-family="'Courier New',Consolas,monospace" font-size="10" font-weight="700" fill="#6ee7b7" opacity="0.80">READY</text>

  <!-- Status pill: RUNNING (lane center 700, very subtle so title shows) -->
  <rect x="644"  y="26" width="112" height="22" rx="11" fill="#f97316" opacity="0.10"/>
  <text x="700"  y="42" text-anchor="middle" font-family="'Courier New',Consolas,monospace" font-size="10" font-weight="700" fill="#fdba74" opacity="0.45">RUNNING</text>

  <!-- Status pill: REVIEW (lane center 980) -->
  <rect x="935"  y="36" width="90"  height="22" rx="11" fill="#0ea5e9" opacity="0.18"/>
  <text x="980"  y="52" text-anchor="middle" font-family="'Courier New',Consolas,monospace" font-size="10" font-weight="700" fill="#7dd3fc" opacity="0.80">REVIEW</text>

  <!-- Status pill: DONE (lane center 1260) -->
  <rect x="1210" y="30" width="100" height="22" rx="11" fill="#8b5cf6" opacity="0.18"/>
  <text x="1260" y="46" text-anchor="middle" font-family="'Courier New',Consolas,monospace" font-size="10" font-weight="700" fill="#c4b5fd" opacity="0.80">DONE</text>

  <!-- Main title -->
  <text x="700" y="108"
    text-anchor="middle"
    font-family="'Courier New','SF Mono','Consolas','Monaco',monospace"
    font-size="50" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">
    kanban-task-engine
  </text>

  <!-- Accent underline below title -->
  <rect x="340" y="115" width="720" height="2" rx="1" fill="url(#h-underline)"/>

  <!-- Subtitle -->
  <text x="700" y="143"
    text-anchor="middle"
    font-family="'Courier New',Consolas,monospace"
    font-size="13" fill="#64748b" letter-spacing="1.5">
    Markdown-native task lifecycle engine · Home &amp; Work
  </text>

  <!-- Bottom wave (blends into GitHub dark bg #0d1117) -->
  <path d="M0 165 C230 150 470 174 700 163 C930 152 1170 176 1400 160 L1400 200 L0 200 Z"
        fill="#0d1117"/>
</svg>
