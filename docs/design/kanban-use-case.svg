<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 700" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="ucTitle ucDesc">
  <title id="ucTitle">kanban-task-engine — Use Case (AI CLI 실행 연동)</title>
  <desc id="ucDesc">Vault 이슈가 AI CLI에 의해 처리되고 사람이 최종 승인하는 칸반 흐름. 5컬럼 (TODO READY RUNNING REVIEW DONE) + FAILED 행. RUNNING REVIEW DONE FAILED 카드에 session ID와 CLI 명령 매핑 (예: kanban run VC-001 --execute --agent codex). approve / retry 명령으로 다음 상태로 이동. isolated worktree에서 실행.</desc>
  <defs>
    <style>
      text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
      .title{font-size:22px;font-weight:700;}
      .sub{font-size:13px;}
      .head{font-size:15px;font-weight:700;}
      .ct{font-size:13px;font-weight:700;}
      .cm{font-size:12px;}
      .lbl{font-size:12px;}
      .ses{font-size:13px;font-weight:700;font-family:Menlo,Consolas,monospace;}
      .cli{font-size:12px;font-family:Menlo,Consolas,monospace;}
      .ftitle{font-size:14px;font-weight:700;}
      .flow{font-size:13px;}
      .mono{font-family:Menlo,Consolas,monospace;}
    </style>
  </defs>

  <rect width="1280" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="44" class="title" fill="#1a1a1a">kanban-task-engine — Use Case (AI CLI 실행 연동)</text>
  <text x="40" y="68" class="sub" fill="#666">Vault의 이슈가 AI CLI에 의해 처리되고, 사람이 최종 승인하는 흐름 · executor: codex</text>

  <!-- Column headers -->
  <rect x="40"   y="100" width="232" height="36" rx="6" fill="#FFF3CD" stroke="#E6A817" stroke-width="2"/>
  <text x="156"  y="124" class="head" fill="#5c3d00" text-anchor="middle">TODO</text>
  <rect x="282"  y="100" width="232" height="36" rx="6" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
  <text x="398"  y="124" class="head" fill="#2e7d32" text-anchor="middle">READY</text>
  <rect x="524"  y="100" width="232" height="36" rx="6" fill="#BBDEFB" stroke="#1E88E5" stroke-width="2"/>
  <text x="640"  y="124" class="head" fill="#1565C0" text-anchor="middle">RUNNING</text>
  <rect x="766"  y="100" width="232" height="36" rx="6" fill="#FFF3CD" stroke="#E6A817" stroke-width="2"/>
  <text x="882"  y="124" class="head" fill="#5c3d00" text-anchor="middle">REVIEW</text>
  <rect x="1008" y="100" width="232" height="36" rx="6" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
  <text x="1124" y="124" class="head" fill="#2e7d32" text-anchor="middle">DONE</text>

  <!-- Column body panels -->
  <rect x="40"   y="136" width="232" height="240" fill="#fffdf0" stroke="#E6A817" stroke-width="1.5"/>
  <rect x="282"  y="136" width="232" height="240" fill="#f5fbf5" stroke="#43A047" stroke-width="1.5"/>
  <rect x="524"  y="136" width="232" height="240" fill="#f0f7ff" stroke="#1E88E5" stroke-width="1.5"/>
  <rect x="766"  y="136" width="232" height="240" fill="#fffdf0" stroke="#E6A817" stroke-width="1.5"/>
  <rect x="1008" y="136" width="232" height="240" fill="#f5fbf5" stroke="#43A047" stroke-width="1.5"/>

  <!-- Inter-column arrows -->
  <text x="277"  y="125" font-size="14" fill="#aaa" text-anchor="middle">→</text>
  <text x="519"  y="125" font-size="14" fill="#aaa" text-anchor="middle">→</text>
  <text x="761"  y="125" font-size="14" fill="#aaa" text-anchor="middle">→</text>
  <text x="1003" y="125" font-size="14" fill="#aaa" text-anchor="middle">→</text>

  <!-- TODO card -->
  <rect x="52" y="152" width="208" height="92" fill="#fff" stroke="#ddd"/>
  <text x="64" y="174" class="ct" fill="#1a1a1a">VC-042 캐시 레이어 추가</text>
  <text x="64" y="198" class="cm" fill="#555">executor: codex</text>
  <text x="64" y="220" class="cm" fill="#555">priority: high</text>

  <!-- READY card -->
  <rect x="294" y="152" width="208" height="92" fill="#fff" stroke="#ddd"/>
  <text x="306" y="174" class="ct" fill="#1a1a1a">VC-038 API 타임아웃 수정</text>
  <text x="306" y="198" class="cm" fill="#555">executor: codex</text>
  <text x="306" y="220" class="cm" fill="#888" font-style="italic">↑ frontmatter status: READY</text>

  <!-- RUNNING card -->
  <rect x="536" y="152" width="208" height="216" fill="#fff" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="548" y="174" class="ct" fill="#1a1a1a">VC-035 로그 포맷 통일</text>
  <text x="548" y="196" class="cm" fill="#1565C0" font-weight="700">▶ AI CLI 실행 중</text>
  <text x="548" y="216" class="cm" fill="#555">isolated worktree</text>
  <rect x="548" y="226" width="184" height="46" fill="#f0f7ff" stroke="#90CAF9" rx="3"/>
  <text x="558" y="244" class="lbl" fill="#888">session</text>
  <text x="558" y="264" class="ses" fill="#1565C0">run-20260507-a3f2</text>
  <text x="548" y="298" class="cli" fill="#1a1a1a">kanban run VC-035</text>
  <text x="548" y="318" class="cli" fill="#1a1a1a">  --execute --agent codex</text>
  <text x="548" y="346" class="lbl" fill="#888" font-style="italic">session 추적 ID</text>

  <!-- REVIEW card -->
  <rect x="778" y="152" width="208" height="200" fill="#fff" stroke="#ddd"/>
  <text x="790" y="174" class="ct" fill="#1a1a1a">VC-031 에러 메시지 개선</text>
  <text x="790" y="196" class="cm" fill="#555">AI CLI 완료 · exit 0</text>
  <text x="790" y="216" class="cm" fill="#7a5c00" font-weight="700">→ 사람이 approve 대기</text>
  <rect x="790" y="226" width="184" height="46" fill="#fffbea" stroke="#f0c36d" rx="3"/>
  <text x="800" y="244" class="lbl" fill="#888">session</text>
  <text x="800" y="264" class="ses" fill="#7a5c00">run-20260507-b1c9</text>
  <text x="790" y="298" class="cli" fill="#1a1a1a">kanban approve VC-031</text>

  <!-- DONE card -->
  <rect x="1020" y="152" width="208" height="180" fill="#fff" stroke="#ddd" opacity="0.95"/>
  <text x="1032" y="174" class="ct" fill="#1a1a1a">VC-028 README 업데이트</text>
  <text x="1032" y="196" class="cm" fill="#2e7d32" font-weight="700">✅ 완료</text>
  <rect x="1032" y="208" width="184" height="46" fill="#f0fbf0" stroke="#a5d6a7" rx="3"/>
  <text x="1042" y="226" class="lbl" fill="#888">session</text>
  <text x="1042" y="246" class="ses" fill="#2e7d32">run-20260506-d7e1</text>
  <text x="1032" y="280" class="cli" fill="#555">completed: 2026-05-06</text>

  <!-- FAILED row -->
  <rect x="40" y="408" width="120" height="40" rx="6" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="100" y="434" class="head" fill="#b71c1c" text-anchor="middle">FAILED</text>
  <rect x="180" y="400" width="340" height="62" fill="#fff" stroke="#E53935"/>
  <text x="194" y="422" class="ct" fill="#1a1a1a">VC-033 DB 마이그레이션</text>
  <text x="194" y="442" class="cm" fill="#b71c1c" font-weight="700">exit non-0 — 변경사항 없음</text>
  <text x="194" y="458" class="ses" fill="#c62828" font-size="12">session: run-20260507-f9a0</text>
  <text x="540" y="438" class="cli" fill="#1a1a1a">kanban retry VC-033</text>
  <text x="540" y="456" class="lbl" fill="#888" font-style="italic">→ READY로 복귀</text>

  <!-- Flow summary -->
  <rect x="40" y="490" width="1200" height="170" rx="6" fill="#f0f4ff" stroke="#b0c4f0"/>
  <text x="56" y="516" class="ftitle" fill="#334">흐름 요약</text>
  <text x="56" y="540" class="flow" fill="#445">
    <tspan>1️⃣ </tspan>
    <tspan font-weight="700" fill="#1a1a1a">status: TODO → READY</tspan>
    <tspan> (frontmatter 편집)</tspan>
  </text>
  <text x="56" y="566" class="flow" fill="#445">
    <tspan>2️⃣ </tspan>
    <tspan class="mono" fill="#1a1a1a">kanban run VC-001 --execute --agent codex</tspan>
    <tspan> — session 생성, AI CLI 실행</tspan>
  </text>
  <text x="56" y="592" class="flow" fill="#445">
    <tspan>3️⃣ exit 0 + 변경 → </tspan>
    <tspan font-weight="700" fill="#5c3d00">REVIEW</tspan>
    <tspan> (session ID 기록)</tspan>
  </text>
  <text x="56" y="618" class="flow" fill="#445">
    <tspan>4️⃣ </tspan>
    <tspan class="mono" fill="#1a1a1a">kanban approve VC-001</tspan>
    <tspan> → </tspan>
    <tspan font-weight="700" fill="#2e7d32">DONE</tspan>
    <tspan> (session 완료)</tspan>
  </text>
  <text x="56" y="644" class="flow" fill="#445">
    <tspan>실패 시: </tspan>
    <tspan class="mono" fill="#1a1a1a">kanban retry VC-001</tspan>
    <tspan> → READY 복귀</tspan>
  </text>
</svg>
