name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check whitespace
        run: git diff --check origin/main...HEAD

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: Superpowers eval
        run: pnpm eval:superpowers

      - name: Hardening eval
        run: pnpm eval:hardening
